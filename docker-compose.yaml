services:
  mssqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mssqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - 1433:1433
    volumes:
      - mssqlserverdata:/var/opt/mssql
      - ./init.sql:/init.sql
    command: >
      /bin/bash -c "
        /opt/mssql/bin/sqlservr &
        PID=$$!
        echo 'Czekam na SQL Server...'
        for i in \$(seq 1 60); do
          if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No 2>/dev/null; then
            echo 'Gotowy! Wykonuję skrypt...'
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -i /init.sql -No
            echo 'Skrypt wykonany!'
            break
          fi
          echo \"Próba \$i/60, czekam 5s...\"
          sleep 5
        done
        wait \$PID
      "

volumes:
  mssqlserverdata: